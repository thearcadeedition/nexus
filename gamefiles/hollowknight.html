<!DOCTYPE html>
<html lang="en-us">
<head>
<base href="https://cdn.jsdelivr.net/gh/aukak/hollow-knight@latest/">
<meta charset="utf-8">
<title>Unity WebGL Player | Hollow Knight</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #000;
    overflow: hidden;
}
#loading-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font: 24px Arial;
}
#unity-canvas {
    width: 100vw;
    height: 100vh;
    display: block;
}
#unity-mobile-warning {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    background: rgba(0,0,0,.9);
    padding: 20px;
    border-radius: 8px;
    font: 14px Arial;
}

/* Secret Credit Style with Fade Animation */
#secret-credit {
    position: fixed;
    bottom: 10px;
    left: 10px;
    color: rgba(255, 255, 255, 0.3);
    font-family: Arial, sans-serif;
    font-size: 12px;
    z-index: 999;
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.2s ease; /* Smooth transition when it disappears */
}
</style>
</head>
<body>
<div id="loading-text">The Arcade Edition</div>
<div id="unity-mobile-warning">WebGL not supported on mobile</div>
<div id="secret-credit">Thank you to Aukak and the Bog for this Hollow Knight Web Port. This would have not been possible without you.</div>
<canvas id="unity-canvas"></canvas>
  
<script>
const lt = document.getElementById("loading-text");
const cv = document.getElementById("unity-canvas");
const mw = document.getElementById("unity-mobile-warning");
const scElement = document.getElementById("secret-credit");
let lb = 0;
const tm = '912.81';

// Hide the credit text after 0.5 seconds (500 milliseconds)
setTimeout(() => {
    if (scElement) {
        scElement.style.opacity = "0";
        setTimeout(() => scElement.remove(), 200); // Fully remove from DOM after fade completes
    }
}, 500);

// Mobile device check
if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
    const m = document.createElement('meta');
    m.name = 'viewport';
    m.content = 'width=device-width,height=device-height,initial-scale=1,user-scalable=no,shrink-to-fit=yes';
    document.head.appendChild(m);
    mw.style.display = "block";
    setTimeout(() => mw.style.display = "none", 5000);
}

// File downloading and stitching helpers
async function fwp(u) {
    const r = await fetch(u), rd = r.body.getReader(), ch = [];
    while (true) {
        const {done, value} = await rd.read();
        if (done) break;
        lb += value.length;
        ch.push(value);
        lt.textContent = `${(lb / 1048576).toFixed(2)} MB / ${tm} MB`;
    }
    return URL.createObjectURL(new Blob(ch));
}

async function mf(p) {
    const b = await Promise.all(p.map(fwp)), bl = await Promise.all(b.map(u => fetch(u).then(r => r.blob())));
    return URL.createObjectURL(new Blob(bl));
}

function gp(f, s, e) {
    return Array.from({length: e - s + 1}, (_, i) => `${f}.part${s + i}`);
}

// FIX: Force browser to unlock and display the cursor when Escape is pressed
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' || e.keyCode === 27) {
        // 1. Break the Unity pointer trap
        if (document.pointerLockElement === cv || document.mozPointerLockElement === cv || document.webkitPointerLockElement === cv) {
            document.exitPointerLock();
        }
        
        // 2. Force CSS to render the mouse pointer explicitly
        cv.style.cursor = 'default';
        document.body.style.cursor = 'default';
    }
});

// Hide the system cursor again if the player clicks back onto the game window
cv.addEventListener('click', () => {
    cv.style.cursor = 'none';
});

// Main loader execution
(async () => {
    const [du, wu] = await Promise.all([
        mf(gp("Build/hktruffled.data", 1, 45)),
        mf(gp("Build/hktruffled.wasm", 1, 2))
    ]);
    
    const sc = document.createElement("script");
    sc.src = "Build/hktruffled.loader.js";
    sc.onload = () => {
        createUnityInstance(cv, {
            dataUrl: du,
            frameworkUrl: "Build/hktruffled.framework.js",
            codeUrl: wu,
            streamingAssetsUrl: "StreamingAssets",
            companyName: "Team Cherry",
            productName: "Hollow Knight",
            productVersion: "1.0"
        }).then(() => {
            lt.remove();
        }).catch(console.error);
    };
    document.body.appendChild(sc);
})();
</script>
</body>
</html>
